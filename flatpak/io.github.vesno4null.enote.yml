id: io.github.vesno4null.enote
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: enote

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: python3-pyyaml
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-build-isolation --prefix=/app pyyaml-6.0.3.tar.gz 2>&1
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/05/8e/961c0007c59b8dd7729d542c61a4d537767a59645b82a0b521206e1e25c2/pyyaml-6.0.3.tar.gz
        sha256: d76623373421df22fb4cf8817020cbb7ef15c725b9d5e45f17e189bfc384190f

  - name: enote
    buildsystem: simple
    build-commands:
      - install -Dm755 enote.sh /app/bin/enote
      - install -Dm644 main.py /app/share/enote/main.py
      - install -Dm644 window.py /app/share/enote/window.py
      - install -Dm644 storage.py /app/share/enote/storage.py
      - install -Dm644 scheduler.py /app/share/enote/scheduler.py
      - install -Dm644 editor_blocks.py /app/share/enote/editor_blocks.py
      - install -Dm644 models.py /app/share/enote/models.py
      - install -Dm644 parser.py /app/share/enote/parser.py
      - install -Dm644 io.github.vesno4null.enote.desktop /app/share/applications/io.github.vesno4null.enote.desktop
      - install -Dm644 io.github.vesno4null.enote.metainfo.xml /app/share/metainfo/io.github.vesno4null.enote.metainfo.xml
      - install -Dm644 io.github.vesno4null.enote.svg /app/share/icons/hicolor/scalable/apps/io.github.vesno4null.enote.svg
    sources:
      - type: dir
        path: ..
      - type: file
        path: enote.sh
      - type: file
        path: io.github.vesno4null.enote.desktop
      - type: file
        path: io.github.vesno4null.enote.metainfo.xml
      - type: file
        path: icons/io.github.vesno4null.enote.svg
